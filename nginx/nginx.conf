# ─────────────────────────────────────────────────────────────────────────────
#  nginx.conf — Reverse proxy in front of Nextcloud
#
#  Key design choices
#  ──────────────────
#  1. JSON access log format so the Python daemon can parse with json.loads().
#  2. Logs written to /var/log/nginx/hng-access.log on the shared Docker
#     volume "HNG-nginx-logs".
#  3. real_ip_header trusts X-Forwarded-For so cloud LB IPs are unwrapped.
#  4. Nextcloud is proxied on the internal Docker network as "nextcloud:80".
# ─────────────────────────────────────────────────────────────────────────────
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    set_real_ip_from  10.0.0.0/8;
    set_real_ip_from  172.16.0.0/12;
    set_real_ip_from  192.168.0.0/16;
    real_ip_header    X-Forwarded-For;
    real_ip_recursive on;

    log_format hng_json escape=json
        '{'
            '"source_ip":"$remote_addr",'
            '"timestamp":"$time_iso8601",'
            '"method":"$request_method",'
            '"path":"$request_uri",'
            '"status":$status,'
            '"response_size":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"http_referrer":"$http_referer",'
            '"user_agent":"$http_user_agent"'
        '}';

    access_log /var/log/nginx/hng-access.log hng_json;

    sendfile    on;
    tcp_nopush  on;
    keepalive_timeout 65;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1024;

    upstream nextcloud_backend {
        server nextcloud:80;
        keepalive 32;
    }

    # ── Metrics dashboard ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name metrics.kunlekush.name.ng;

        access_log off;

        location / {
            proxy_pass http://172.31.79.101:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    # ── Nextcloud ─────────────────────────────────────────────────────────
    server {
        listen 80 default_server;
        server_name _;

        client_max_body_size 512M;

        add_header X-Frame-Options       "SAMEORIGIN"   always;
        add_header X-Content-Type-Options "nosniff"      always;
        add_header X-XSS-Protection      "1; mode=block" always;
        add_header Referrer-Policy       "no-referrer"   always;

        location / {
            proxy_pass         http://nextcloud_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            proxy_connect_timeout  60s;
            proxy_send_timeout    300s;
            proxy_read_timeout    300s;
            proxy_buffering       off;
            proxy_request_buffering off;
        }

        location = /.well-known/carddav {
            return 301 $scheme://$host/remote.php/dav;
        }
        location = /.well-known/caldav {
            return 301 $scheme://$host/remote.php/dav;
        }

        location /nginx-health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }
    }
}
